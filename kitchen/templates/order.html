{% extends 'base.html' %}

{% block content%}
    <h1 style="text-align:left;">🍽️ Food Details
    </h1>
    <h3 style="text-align: left; color:#666;">Order Your Food 🍴</h3>

    <h2>{{ food.food_name }}</h2>
    <img src="{{ food.image.url }}" width="300" style="border-radius: 10px;"><br><br>
    <p>{{ food.description }}</p><br>
    <h3>Price: ₹{{ food.price }}</h3><br>
    <a href="{% url 'add_to_cart' food.id %}">
        <button class="add-cart-btn">Add to cart</button>
    </a>
    <br> <br>

    <a href="/" class="back-btn">⬅ Back to Home</a>
{% endblock %}
