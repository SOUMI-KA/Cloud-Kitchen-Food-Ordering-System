{% extends 'base.html' %}

{% block content %}

<h1 style="text-align:center; margin-top:30px; color:#ff6b35;">
    💳 Checkout
</h1>

<p style="text-align:center; color:#666; font-style:italic;">
    Please provide your delivery details to complete your order.
</p>

<div style="
width:500px;
margin:30px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);">

<form method="POST">
    {% csrf_token %}

    <label><b>👤 Full Name</b></label><br>
    <input
        type="text"
        name="name"
        pattern="[A-Za-z ]+"
        minlength="3"
        maxlength="50"
        placeholder="Enter your full name"
        required
        style="width:100%; padding:10px; margin-top:8px; margin-bottom:20px;">

    <label><b>📞 Phone Number</b></label><br>
    <input
        type="tel"
        name="phone"
        pattern="[6-9][0-9]{9}"
        maxlength="10"
        placeholder="Enter your mobile number"
        required
        style="width:100%; padding:10px; margin-top:8px; margin-bottom:20px;">

    <label><b>📍 Delivery Address</b></label><br>
    <textarea
        name="address"
        rows="4"
        minlength="10"
        maxlength="250"
        placeholder="Enter your complete delivery address"
        required
        style="width:100%; padding:10px; margin-top:8px; margin-bottom:20px;"></textarea>

    <div style="
    background:#fff5ef;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;">

        <h3 style="color:#ff6b35; margin:0;">
            📦 Order Summary
        </h3>

        <h2 style="margin-top:10px;">
            Total Amount: ₹{{ total }}
        </h2>

    </div>

    <button
    type="submit"
    style="
    width:100%;
    padding:12px;
    background:#ff6b35;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;">
        ✅ Place Order
    </button>

</form>

</div>

{% endblock %}
