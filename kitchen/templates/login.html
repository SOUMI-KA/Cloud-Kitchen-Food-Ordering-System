{% extends 'base.html' %}

{% block content %}

<div style="width:400px; margin:40px auto; background:white; padding:30px; border-radius:10px; box-shadow:0 0 10px gray;">

    <h2 style="text-align:center;">🔐 Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               required
               style="width:100%; padding:10px; margin:10px 0;">

        <input type="password"
               name="password"
               placeholder="Password"
               required
               style="width:100%; padding:10px; margin:10px 0;">

        <button type="submit"
                style="width:100%; padding:12px; background:#ff6b35; color:white; border:none; border-radius:5px; font-size:16px;">
            Login
        </button>

    </form>

    <p style="text-align:center; margin-top:15px;">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </p>

</div>

{% endblock %}
